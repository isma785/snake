<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yasmine Snake 💗</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --pink:      #FF6FA5;
    --pink-dark: #E8497E;
    --pink-pale: #FFD6E7;
    --lavender:  #B9A6FF;
    --mint:      #6FE0B8;
    --ink:       #5B3A56;
    --board:     #4B3B6B;
    --cream:     #FFF7FB;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    padding: 28px 16px 40px;
    background: linear-gradient(160deg, #FFE3EF 0%, #F1E7FF 55%, #E4F9F0 100%);
    font-family: 'Quicksand', sans-serif;
    color: var(--ink);
    overflow-x: hidden;
  }

  /* Dekorative Herzen, die sanft im Hintergrund schweben */
  .floaties {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .floaties span {
    position: absolute;
    opacity: 0.35;
    animation: drift 7s ease-in-out infinite;
  }

  @keyframes drift {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-18px) rotate(4deg); }
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 440px;
    margin: 0 auto;
    text-align: center;
  }

  .header {
    margin-bottom: 14px;
  }

  .title {
    margin: 0;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 38px;
    color: var(--pink-dark);
  }

  .title .wiggle {
    display: inline-block;
    animation: wiggle 2.2s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg) scale(1); }
    50%      { transform: rotate(-10deg) scale(1.15); }
  }

  .subtitle {
    margin: 2px 0 0;
    font-weight: 600;
    color: var(--ink);
    opacity: 0.7;
    font-size: 14.5px;
  }

  .daily-quote {
    margin: 8px auto 0;
    max-width: 320px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    color: var(--pink-dark);
    background: white;
    border: 1.5px solid var(--pink-pale);
    border-radius: 999px;
    padding: 6px 16px;
    box-shadow: 0 3px 0 var(--pink-pale);
    animation: quoteIn .5s ease-out;
  }

  @keyframes quoteIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .birthday-countdown {
    margin: 8px auto 0;
    max-width: 360px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: white;
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    border-radius: 999px;
    padding: 7px 18px;
    box-shadow: 0 4px 10px -4px rgba(232,73,126,0.5);
    animation: quoteIn .5s ease-out .1s both;
  }

  .birthday-countdown .cake {
    display: inline-block;
    animation: wiggle 2.2s ease-in-out infinite;
  }

  .birthday-countdown .cd-unit {
    display: inline-flex;
    align-items: baseline;
    gap: 2px;
    font-variant-numeric: tabular-nums;
  }

  .birthday-countdown .cd-unit small {
    font-size: 9px;
    font-weight: 600;
    opacity: 0.85;
    text-transform: uppercase;
  }

  /* Herz-Fortschrittsanzeige statt trockener Zahl */
  .hearts-progress {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 18px 0 20px;
  }

  .heart-slot {
    font-size: 30px;
    transition: transform .2s ease;
  }

  .heart-slot.filled {
    animation: heartPop .5s ease-out;
  }

  @keyframes heartPop {
    0%   { transform: scale(0.5); }
    60%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .game-frame {
    position: relative;
    background: var(--cream);
    border-radius: 32px;
    padding: 20px 20px 26px;
    border: 5px solid white;
    box-shadow:
      0 4px 0 var(--pink-pale),
      0 18px 34px -18px rgba(232,73,126,0.45);
  }

  .score-bubble {
    position: absolute;
    top: -18px;
    left: 22px;
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: white;
    padding: 8px 16px;
    border-radius: 999px;
    transform: rotate(-6deg);
    box-shadow: 0 6px 14px -4px rgba(232,73,126,0.6);
    font-family: 'Fredoka', sans-serif;
  }

  .score-label {
    display: block;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.85;
    font-weight: 500;
  }

  .score-value {
    display: block;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .score-value.pulse {
    animation: pulse .4s ease-out;
  }

  @keyframes pulse {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  .stage {
    position: relative;
    margin-top: 14px;
  }

  canvas#game {
    display: block;
    width: 100%;
    max-width: 380px;
    height: auto;
    aspect-ratio: 1 / 1;
    margin: 0 auto;
    background: var(--board);
    border-radius: 22px;
    border: 4px solid var(--lavender);
    box-shadow: inset 0 0 24px rgba(0,0,0,0.18);
  }

  #bonusMsg {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: white;
    background: var(--mint);
    padding: 5px 16px;
    border-radius: 999px;
    box-shadow: 0 4px 10px -3px rgba(111,224,184,0.7);
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  #bonusMsg.show {
    animation: bonusPop 1.3s ease-out;
  }

  @keyframes bonusPop {
    0%   { opacity: 0; transform: translateX(-50%) translateY(6px) scale(.8); }
    18%  { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.08); }
    75%  { opacity: 1; transform: translateX(-50%) translateY(-2px) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-8px) scale(1); }
  }

  .btn {
    margin-top: 22px;
    padding: 13px 30px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--lavender), #9C82FF);
    color: white;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 5px 0 #8064E8;
    transition: transform .12s ease, box-shadow .12s ease;
  }

  .btn:hover {
    transform: translateY(2px);
    box-shadow: 0 3px 0 #8064E8;
  }

  .btn:active {
    transform: translateY(5px);
    box-shadow: 0 0 0 #8064E8;
  }

  .btn:focus-visible {
    outline: 2px solid var(--pink-dark);
    outline-offset: 3px;
  }

  .hint {
    margin: 10px auto 0;
    width: 100%;
    text-align: center;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
    opacity: 0.65;
  }

  .key {
    display: inline-block;
    background: white;
    border: 1.5px solid var(--pink-pale);
    border-radius: 6px;
    padding: 1px 8px;
    font-family: 'Fredoka', sans-serif;
    color: var(--pink-dark);
    box-shadow: 0 2px 0 var(--pink-pale);
  }

  /* ---------- Motivations-Ente ---------- */

  .duck-wrap {
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%) translateY(140%);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 500;
    pointer-events: none;
    opacity: 0;
    transition: opacity .18s ease;
  }

  .duck-wrap.show {
    animation: duckHop 2.1s ease-out;
  }

  @keyframes duckHop {
    0%   { opacity: 0; transform: translateX(-50%) translateY(140%); }
    12%  { opacity: 1; transform: translateX(-50%) translateY(0%); }
    18%  { transform: translateX(-50%) translateY(-8%); }
    24%  { transform: translateX(-50%) translateY(0%); }
    82%  { opacity: 1; transform: translateX(-50%) translateY(0%); }
    100% { opacity: 0; transform: translateX(-50%) translateY(140%); }
  }

  .duck-bubble {
    background: white;
    color: var(--ink);
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 9px 16px;
    border-radius: 16px;
    border: 3px solid var(--mint);
    box-shadow: 0 8px 16px -6px rgba(0,0,0,0.25);
    white-space: nowrap;
    margin-bottom: 6px;
    position: relative;
  }

  .duck-bubble::after {
    content: "";
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 10px 8px 0 8px;
    border-style: solid;
    border-color: white transparent transparent transparent;
  }

  .duck-emoji {
    font-size: 42px;
    animation: critterWiggle .4s ease-in-out infinite alternate;
  }

  @keyframes critterWiggle {
    from { transform: rotate(-6deg); }
    to   { transform: rotate(6deg); }
  }

  /* ---------- Überraschungs-Modal ---------- */

  #fireworks {
    position: fixed;
    inset: 0;
    z-index: 950;
    pointer-events: none;
    display: none;
  }

  #surprise {
    position: fixed;
    inset: 0;
    background: rgba(75, 59, 107, 0.78);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 900;
    padding: 20px;
  }

  .surprise-card {
    position: relative;
    z-index: 1000;
    background: var(--cream);
    padding: 40px 32px;
    border-radius: 30px;
    text-align: center;
    max-width: 340px;
    border: 5px solid white;
    animation: pop .5s ease-out;
    box-shadow: 0 24px 48px -16px rgba(0,0,0,0.4);
  }

  .flowers-badge {
    width: 90px;
    height: 90px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink-pale), var(--lavender));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    animation: float 2.4s ease-in-out infinite;
  }

  .surprise-card h2 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    color: var(--pink-dark);
    font-size: 26px;
    margin: 0 0 10px;
  }

  .surprise-card p {
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--ink);
    margin: 0 0 22px;
    font-weight: 600;
  }

  @keyframes pop {
    from { transform: scale(.85); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-6px) rotate(4deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
  }
</style>
</head>

<body>

<div class="floaties" aria-hidden="true">
  <span style="top:8%;  left:8%;  font-size:26px; animation-delay:0s;">💗</span>
  <span style="top:20%; left:82%; font-size:20px; animation-delay:1.2s;">💕</span>
  <span style="top:55%; left:4%;  font-size:22px; animation-delay:2.4s;">💖</span>
  <span style="top:75%; left:88%; font-size:24px; animation-delay:.6s;">💗</span>
  <span style="top:88%; left:15%; font-size:18px; animation-delay:1.8s;">💕</span>
</div>

<div class="page">
  <div class="header">
    <h1 class="title">Yasmine <span class="wiggle">💗</span></h1>
    <p class="subtitle">Snake mit ganz viel Liebe</p>
    <p class="daily-quote" id="dailyQuote"></p>
	<p class="birthday-countdown" id="birthdayCountdown"></p>
  </div>

  <div class="hearts-progress" id="heartsProgress">
    <span class="heart-slot" data-index="0">🤍</span>
    <span class="heart-slot" data-index="1">🤍</span>
    <span class="heart-slot" data-index="2">🤍</span>
    <span class="heart-slot" data-index="3">🤍</span>
    <span class="heart-slot" data-index="4">🤍</span>
  </div>

  <div class="game-frame">
    <div class="score-bubble">
      <span class="score-label">Punkte</span>
      <span class="score-value" id="score">0</span>
    </div>

    <div class="stage">
      <canvas id="game" width="400" height="400"></canvas>
      <div id="bonusMsg"></div>
    </div>

    <button class="btn" onclick="restart()">Neu starten 🔁</button>
    <p class="hint">oder einfach <span class="key">Leertaste</span> drücken ⌨️</p>
  </div>
</div>

<div class="duck-wrap" id="duckWrap">
  <div class="duck-bubble" id="duckBubble">Los geht's!</div>
  <div class="duck-emoji" id="duckEmoji">🦆</div>
</div>

<canvas id="fireworks"></canvas>

<div id="surprise">
  <div class="surprise-card">
    <div class="flowers-badge">🌸</div>
    <h2>Für Yasmine!</h2>
    <p>
      Du hast alle 5 Herzen gesammelt! 🎉<br>
      Diese Blumen sind nur für dich. 🌸<br>
      Du bist die Nummer 1. 💖
    </p>
    <button class="btn" onclick="closeSurprise()">Weiter spielen</button>
    <p class="hint">oder <span class="key">Leertaste</span> drücken ⌨️</p>
  </div>
</div>

<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const GRID_SIZE = 20;
  const GRID_COUNT = canvas.width / GRID_SIZE;
  const SURPRISE_SCORE = 5;
  const SPEED = 100;

  const BONUS_SPAWN_CHANCE = 0.4;
  const BONUS_POINTS = 3;
  const BONUS_LIFETIME_TICKS = 50;
  const BONUS_BLINK_TICKS = 15;

  const COLOR_BOARD = "#4B3B6B";
  const COLOR_HEAD = "#FF6FA5";
  const COLOR_BODY_A = "#B9A6FF";
  const COLOR_BODY_B = "#FFD6E7";

  const TRAIL_START_SCORE = 5;
  const TRAIL_MAX_LENGTH = 18;
  const TRAIL_COLORS = ["#FF6FA5", "#B9A6FF", "#6FE0B8", "#FFD6E7"];

  let snake, food, dx, dy, score, gameLoop;
  let bonus = null;
  let bonusTicksLeft = 0;
  let surpriseShown = false;
  let isGameOver = false;
  let trail = [];

  // ---------- Tages-Zufallsspruch ----------

  const DAILY_QUOTES = [
    "Heute wird ein guter Tag 🌸",
    "Du schaffst das, Yasmine! 💪",
    "Ein Lächeln steht dir gut 💗",
    "Du bist stärker als du denkst 🌟",
    "Kleine Schritte zählen auch ✨",
    "Du bist genug, so wie du bist 💖",
    "Heute darfst du stolz auf dich sein 🌷",
    "Atme durch, alles wird gut 🍃",
    "Du machst das großartig 🎀",
    "Ein Tag voller Möglichkeiten wartet 🌈",
    "Sei stolz auf jeden kleinen Erfolg 🏵️",
    "Du bringst Licht in den Tag 🌞",
    "Vertrau dir selbst ein bisschen mehr 💫",
    "Du bist etwas ganz Besonderes 💝",
    "Heute ist dein Tag, Yasmine 🎉",
    "Sanft zu dir selbst sein, immer erlaubt 🕊️",
    "Kleine Freuden zählen am meisten 🍓",
    "Du hast schon so viel geschafft 🌻",
    "Bleib du selbst, das reicht völlig 💗",
    "Ein guter Gedanke reicht schon aus 🌼",
    "Du wirst gesehen und geschätzt 💕",
    "Auch ruhige Tage sind wertvoll 🌙",
    "Dein Lächeln macht andere glücklich 😊",
    "Du bist mutiger, als du glaubst 🦋",
    "Freu dich auf die kleinen Dinge 🍀",
    "Du verdienst nur das Beste 💐",
    "Heute zählt jeder Fortschritt 🌸",
    "Du bist niemals allein 🤍",
    "Mach weiter, du bist auf gutem Weg 🚀",
    "Yasmine, du bist unersetzlich 💖",
    "Ein neuer Tag, neue Chancen 🌅"
  ];

  function showDailyQuote() {
    const el = document.getElementById("dailyQuote");
    if (!el) return;

    const today = new Date();
    const dayNumber = Math.floor(today.getTime() / 86400000);
    const index = dayNumber % DAILY_QUOTES.length;

    el.textContent = DAILY_QUOTES[index];
  }

  // ---------- Geburtstags-Countdown (16.11.) ----------

  const BIRTHDAY_DAY = 16;
  const BIRTHDAY_MONTH = 11; // November

  function getNextBirthday(now) {
    const isToday =
      now.getDate() === BIRTHDAY_DAY && now.getMonth() === BIRTHDAY_MONTH - 1;

    if (isToday) return null;

    let next = new Date(now.getFullYear(), BIRTHDAY_MONTH - 1, BIRTHDAY_DAY, 0, 0, 0, 0);
    if (next < now) {
      next = new Date(now.getFullYear() + 1, BIRTHDAY_MONTH - 1, BIRTHDAY_DAY, 0, 0, 0, 0);
    }
    return next;
  }

  function updateBirthdayCountdown() {
    const el = document.getElementById("birthdayCountdown");
    if (!el) return;

    const now = new Date();
    const nextBirthday = getNextBirthday(now);

    if (!nextBirthday) {
      el.innerHTML = '<span class="cake">🎂</span> Alles Gute zum Geburtstag, Yasmine! 🎉';
      return;
    }

    const diffMs = nextBirthday - now;
    const totalSeconds = Math.max(0, Math.floor(diffMs / 1000));

    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    const pad = n => String(n).padStart(2, "0");

    el.innerHTML =
      '<span class="cake">🎂</span> ' +
      '<span class="cd-unit">' + days + '<small>T</small></span> ' +
      '<span class="cd-unit">' + pad(hours) + '<small>Std</small></span> ' +
      '<span class="cd-unit">' + pad(minutes) + '<small>Min</small></span> ' +
      '<span class="cd-unit">' + pad(seconds) + '<small>Sek</small></span>';
  }

  function showBirthdayCountdown() {
    updateBirthdayCountdown();
    setInterval(updateBirthdayCountdown, 1000);
  }

  function start() {
    snake = [
      { x: 200, y: 200 },
      { x: 180, y: 200 },
      { x: 160, y: 200 }
    ];

    food = randomFreePosition();
    dx = GRID_SIZE;
    dy = 0;
    score = 0;
    bonus = null;
    bonusTicksLeft = 0;
    surpriseShown = false;
    isGameOver = false;
    trail = [];

    resetHeartsProgress();
    updateScoreDisplay();

    clearInterval(gameLoop);
    gameLoop = setInterval(draw, SPEED);
  }

  function randomFreePosition(avoidExtra = []) {
    let pos;
    let tries = 0;

    do {
      pos = {
        x: Math.floor(Math.random() * GRID_COUNT) * GRID_SIZE,
        y: Math.floor(Math.random() * GRID_COUNT) * GRID_SIZE
      };
      tries++;
    } while (
      tries < 50 &&
      (
        (snake && snake.some(p => p.x === pos.x && p.y === pos.y)) ||
        (food && food.x === pos.x && food.y === pos.y) ||
        avoidExtra.some(p => p.x === pos.x && p.y === pos.y)
      )
    );

    return pos;
  }

  function resetHeartsProgress() {
    document.querySelectorAll(".heart-slot").forEach(el => {
      el.textContent = "🤍";
      el.classList.remove("filled");
    });
  }

  function updateHeartsProgress() {
    const slots = document.querySelectorAll(".heart-slot");
    slots.forEach((el, i) => {
      const shouldBeFilled = i < Math.min(score, SURPRISE_SCORE);
      const isFilled = el.textContent === "❤️";

      if (shouldBeFilled && !isFilled) {
        el.textContent = "❤️";
        el.classList.remove("filled");
        void el.offsetWidth;
        el.classList.add("filled");
      }
    });
  }

  function updateScoreDisplay(pulse = false) {
    const scoreEl = document.getElementById("score");
    scoreEl.textContent = score;

    if (pulse) {
      scoreEl.classList.remove("pulse");
      void scoreEl.offsetWidth;
      scoreEl.classList.add("pulse");
    }

    updateHeartsProgress();
  }

  function roundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
  }

  function draw() {
    ctx.fillStyle = COLOR_BOARD;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Farbspur hinter der Schlange (ab TRAIL_START_SCORE Punkten)
    trail.forEach(t => {
      const alpha = t.life / TRAIL_MAX_LENGTH;
      ctx.globalAlpha = alpha * 0.55;
      ctx.fillStyle = t.color;
      roundedRect(t.x, t.y, 18, 18, 6);
    });
    ctx.globalAlpha = 1;

    // Essen
    ctx.font = "25px Arial";
    ctx.fillText("❤️", food.x, food.y + 20);

    // Bonus-Item (blinkt kurz bevor er verschwindet)
    if (bonus) {
      const blinking = bonusTicksLeft <= BONUS_BLINK_TICKS && bonusTicksLeft % 6 < 3;
      if (!blinking) {
        ctx.fillText("🍓", bonus.x, bonus.y + 20);
      }
    }

    // Schlange (abwechselnd Rosa/Lavendel, schön rund)
    snake.forEach((part, index) => {
      if (index === 0) {
        ctx.fillStyle = COLOR_HEAD;
      } else {
        ctx.fillStyle = index % 2 === 0 ? COLOR_BODY_A : COLOR_BODY_B;
      }
      roundedRect(part.x, part.y, 18, 18, 6);
    });

    // Spur-Punkt an aktueller Kopfposition hinterlassen
    if (score >= TRAIL_START_SCORE) {
      trail.push({
        x: snake[0].x,
        y: snake[0].y,
        life: TRAIL_MAX_LENGTH,
        color: TRAIL_COLORS[Math.floor(Math.random() * TRAIL_COLORS.length)]
      });
    }
    trail.forEach(t => t.life--);
    trail = trail.filter(t => t.life > 0);
    if (trail.length > 60) trail = trail.slice(-60);

    const head = { x: snake[0].x + dx, y: snake[0].y + dy };

    // Wand treffen
    if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
      gameOver();
      return;
    }

    // Sich selbst treffen
    for (const part of snake) {
      if (head.x === part.x && head.y === part.y) {
        gameOver();
        return;
      }
    }

    snake.unshift(head);

    // Bonus-Timer ablaufen lassen
    if (bonus) {
      bonusTicksLeft--;
      if (bonusTicksLeft <= 0) {
        bonus = null;
      }
    }

    // Essen gefunden
    if (head.x === food.x && head.y === food.y) {
      score++;
      updateScoreDisplay(true);
      showDuckMessage();

      if (score >= SURPRISE_SCORE && !surpriseShown) {
        surpriseShown = true;
        clearInterval(gameLoop);
        showSurprise();
      }

      food = randomFreePosition(bonus ? [bonus] : []);

      if (!bonus && Math.random() < BONUS_SPAWN_CHANCE) {
        bonus = randomFreePosition([food]);
        bonusTicksLeft = BONUS_LIFETIME_TICKS;
      }
    } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
      score += BONUS_POINTS;
      bonus = null;
      updateScoreDisplay(true);
      showBonusMessage();
      showDuckMessage();

      if (score >= SURPRISE_SCORE && !surpriseShown) {
        surpriseShown = true;
        clearInterval(gameLoop);
        showSurprise();
      }

      snake.pop();
    } else {
      snake.pop();
    }
  }

  // ---------- Motivations-Ente ----------

  const CRITTERS = ["🦆", "🐱", "🐶", "🐰", "🦊", "🐼", "🐸", "🐻", "🦄", "🐨"];

  const DUCK_MESSAGES = [
    "Super gemacht! 💗",
    "Yasmine on fire! 🔥",
    "Weiter so! 🌟",
    "Du bist die Beste! 💖",
    "Wow, nice! ✨",
    "Klasse gemacht! 🐣",
    "Läuft bei dir! ✨",
    "Ein Punkt mehr für dich! 🎉",
    "So stolz auf dich! 🌸",
    "Genau richtig! 💪"
  ];

  let duckTimeout = null;

  function showDuckMessage() {
    const wrap = document.getElementById("duckWrap");
    const bubble = document.getElementById("duckBubble");
    const emoji = document.getElementById("duckEmoji");

    emoji.textContent = CRITTERS[Math.floor(Math.random() * CRITTERS.length)];
    bubble.textContent = DUCK_MESSAGES[Math.floor(Math.random() * DUCK_MESSAGES.length)];

    wrap.classList.remove("show");
    void wrap.offsetWidth;
    wrap.classList.add("show");

    clearTimeout(duckTimeout);
    duckTimeout = setTimeout(() => wrap.classList.remove("show"), 2100);
  }

  function showBonusMessage() {
    const el = document.getElementById("bonusMsg");
    el.textContent = "+" + BONUS_POINTS + " Bonus 🍓";
    el.classList.remove("show");
    void el.offsetWidth;
    el.classList.add("show");
  }

  function gameOver() {
    clearInterval(gameLoop);
    isGameOver = true;
    setTimeout(() => {
      alert("Game Over 💗\n\nYasmine bleibt trotzdem die Nummer 1!\n\nDrück Leertaste für einen Neustart 🔁");
    }, 100);
  }

  const CONTROL_KEYS = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " ", "Spacebar"];

  document.addEventListener("keydown", e => {
    if (CONTROL_KEYS.includes(e.key) || e.code === "Space") {
      e.preventDefault();
    }

    if (e.key === " " || e.code === "Space") {
      const surpriseVisible = document.getElementById("surprise").style.display === "flex";

      if (surpriseVisible) {
        closeSurprise();
      } else if (isGameOver) {
        restart();
      }
      return;
    }
    if (e.key === "ArrowUp" && dy !== GRID_SIZE) { dx = 0; dy = -GRID_SIZE; }
    if (e.key === "ArrowDown" && dy !== -GRID_SIZE) { dx = 0; dy = GRID_SIZE; }
    if (e.key === "ArrowLeft" && dx !== GRID_SIZE) { dx = -GRID_SIZE; dy = 0; }
    if (e.key === "ArrowRight" && dx !== -GRID_SIZE) { dx = GRID_SIZE; dy = 0; }
  }, { passive: false });

  function restart() {
    start();
  }

  // ---------- Überraschung: Blumen + Feuerwerk ----------

  const fwCanvas = document.getElementById("fireworks");
  const fwCtx = fwCanvas.getContext("2d");
  let particles = [];
  let fwAnimationId = null;

  function resizeFireworksCanvas() {
    fwCanvas.width = window.innerWidth;
    fwCanvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resizeFireworksCanvas);

  function randomColor() {
    const colors = ["#FF6FA5", "#B9A6FF", "#6FE0B8", "#FFD6E7", "#FFFFFF"];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function spawnFirework(x, y) {
    const particleCount = 40;
    const color = randomColor();

    for (let i = 0; i < particleCount; i++) {
      const angle = (Math.PI * 2 * i) / particleCount;
      const speed = 2 + Math.random() * 3;

      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color
      });
    }
  }

  function launchFireworksShow() {
    resizeFireworksCanvas();
    fwCanvas.style.display = "block";
    particles = [];

    const bursts = 5;
    for (let i = 0; i < bursts; i++) {
      setTimeout(() => {
        const x = fwCanvas.width * (0.2 + Math.random() * 0.6);
        const y = fwCanvas.height * (0.2 + Math.random() * 0.4);
        spawnFirework(x, y);
      }, i * 500);
    }

    if (!fwAnimationId) {
      animateFireworks();
    }
  }

  function animateFireworks() {
    fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);

    fwCtx.fillStyle = "rgba(75,59,107,0.06)";
    fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
    fwCtx.globalCompositeOperation = "lighter";

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.03;
      p.alpha -= 0.015;

      fwCtx.beginPath();
      fwCtx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
      fwCtx.fillStyle = p.color;
      fwCtx.globalAlpha = Math.max(p.alpha, 0);
      fwCtx.fill();
    });

    fwCtx.globalAlpha = 1;
    fwCtx.globalCompositeOperation = "source-over";

    particles = particles.filter(p => p.alpha > 0);

    if (particles.length > 0 || document.getElementById("surprise").style.display === "flex") {
      fwAnimationId = requestAnimationFrame(animateFireworks);
    } else {
      fwAnimationId = null;
      fwCanvas.style.display = "none";
    }
  }

  function showSurprise() {
    document.getElementById("surprise").style.display = "flex";
    launchFireworksShow();
  }

  function closeSurprise() {
    document.getElementById("surprise").style.display = "none";
    gameLoop = setInterval(draw, SPEED);
  }

  
  showDailyQuote();
  showBirthdayCountdown();
  start();
</script>

</body>
